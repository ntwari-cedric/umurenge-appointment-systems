<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Umurenge Appointment System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

    <div class="auth-overlay">
        <div class="auth-card">
            <div class="auth-tabs">
                <a href="{{ url_for('login') }}" class="auth-tab">SIGN IN</a>
                <a href="{{ url_for('register') }}" class="auth-tab active">SIGN UP</a>
            </div>

            <div class="auth-form-area">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Register to use Umurenge Appointment System</p>

                {% if error %}
                    <p class="error-text">{{ error }}</p>
                {% endif %}

                <form method="POST" class="modern-form">
                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>

                    <button type="submit" class="login-main-btn">SIGN UP</button>
                </form>

                <div class="auth-links">
                    <a href="{{ url_for('login') }}">Already have an account? Sign in</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
